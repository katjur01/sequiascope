services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: juraskovakaterina/sequiascope-app:latest
    container_name: sequiascope-app
    ports:
      - "8080:8080"
    volumes:
      - ./input_files:/input_files:ro
      - ./output_files:/output_files
    depends_on:
      - igv
    environment:
      - IGV_HOST=localhost
      - IGV_PORT=8081
      - IGV_PATH_PREFIX=/igv-static



  igv:
    build:
      context: .
      dockerfile: Dockerfile-igv
    image: juraskovakaterina/sequiascope-igv:latest
    container_name: sequiascope-igv
    ports:
      - "8081:8081"
    volumes:
      - ./input_files:/input_files
      - ./output_files:/output_files
    environment:
      - INPUT_DIR=/input_files
      - OUTPUT_BASE_DIR=/output_files
      - WATCH_DIR=/output_files/sessions
      - PROCESSED_DIR=/output_files/.processed_batches

